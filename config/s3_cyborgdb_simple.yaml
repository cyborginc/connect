rate_limit_resources:
  - label: embeddings_rl
    local:
      count: 10
      interval: 1s

input:
  aws_s3:
    bucket: ${S3_BUCKET}
    prefix: ${S3_PREFIX:}
    region: ${AWS_REGION:us-east-1}
    credentials:
      id: ${AWS_ACCESS_KEY_ID}
      secret: ${AWS_SECRET_ACCESS_KEY}
    codec: all-bytes
    delete_objects: false

pipeline:
  processors:
    # Log file processing
    - log:
        level: INFO
        message: "📄 Processing: ${! meta(\"s3_key\") }"

    # Store original content in metadata
    - mapping: |
        meta file_content = content().string().slice(0, 8000)
        root = content()

    # Prepare OpenAI request
    - mapping: |
        root = {
          "model": "text-embedding-ada-002",
          "input": meta("file_content")
        }

    # Call OpenAI
    - http:
        verb: POST
        url: https://api.openai.com/v1/embeddings
        headers:
          Authorization: Bearer ${OPENAI_API_KEY}
          Content-Type: application/json
        rate_limit: embeddings_rl
        retries: 3
        timeout: 30s

    # Extract embeddings and prepare for CyborgDB
    - mapping: |
        let embeddings = content().parse_json().data.index(0).embedding
        let original_content = meta("file_content")
        root = {
          "id": uuid_v4(),
          "vector": $embeddings,
          "metadata": {
            "source": "s3",
            "path": meta("s3_key"),
            "bucket": meta("s3_bucket"),
            "content": $original_content,
            "content_preview": $original_content.slice(0, 500),
            "indexed_at": now().string()
          }
        }

    # Log success
    - log:
        level: INFO
        message: "✅ Indexed: ${! json(\"metadata.path\") }"

output:
  cyborgdb:
    host: ${CYBORGDB_HOST}
    api_key: ${CYBORGDB_API_KEY}
    index_name: ${CYBORGDB_INDEX_NAME:documents}
    index_key: ${CYBORGDB_INDEX_KEY}
    create_if_missing: true
    operation: upsert
    id: ${! json("id") }
    vector_mapping: root = this.vector
    metadata_mapping: root = this.metadata
    max_in_flight: 1

logger:
  level: INFO
  format: logfmt
  add_timestamp: true