input:
  aws_s3:
    bucket: ${S3_BUCKET}
    prefix: ${S3_PREFIX:}
    region: ${AWS_REGION:us-east-1}
    credentials:
      id: ${AWS_ACCESS_KEY_ID}
      secret: ${AWS_SECRET_ACCESS_KEY}
    codec: all-bytes
    delete_objects: false

pipeline:
  processors:
    # Log when we get a file
    - log:
        level: INFO
        message: "📄 Processing file: ${! meta(\"s3_key\") }"

    # Extract and keep content throughout pipeline
    - mapping: |
        root = {
          "id": uuid_v4(),
          "content_text": content().string(),
          "path": meta("s3_key"),
          "bucket": meta("s3_bucket")
        }

    # Generate embeddings - preserve all fields
    - branch:
        processors:
          - mapping: |
              root = {
                "model": "text-embedding-ada-002",
                "input": this.content_text.slice(0, 8000)
              }
          - http:
              verb: POST
              url: https://api.openai.com/v1/embeddings
              headers:
                Authorization: Bearer ${OPENAI_API_KEY}
                Content-Type: application/json
              retries: 3
              timeout: 30s
        result_map: |
          root = this
          root.embedding_vector = content().parse_json().data.index(0).embedding

    # Log success with actual path
    - log:
        level: INFO
        message: "✅ Embeddings generated for: ${! json(\"path\") }"

    # Final preparation for CyborgDB
    - mapping: |
        root = {
          "id": this.id,
          "vector": this.embedding_vector,
          "metadata": {
            "source": "s3",
            "path": this.path,
            "bucket": this.bucket,
            "content_preview": this.content_text.slice(0, 500),
            "content_length": this.content_text.length(),
            "indexed_at": now().string()
          }
        }

    # Log before sending with actual path
    - log:
        level: INFO
        message: "➡️ Sending to CyborgDB: ${! json(\"metadata.path\") }"

output:
  cyborgdb:
    host: ${CYBORGDB_HOST}
    api_key: ${CYBORGDB_API_KEY}
    index_name: ${CYBORGDB_INDEX_NAME:documents}
    index_key: ${CYBORGDB_INDEX_KEY}
    create_if_missing: true
    operation: upsert
    id: ${! json("id") }
    vector_mapping: root = this.vector
    metadata_mapping: root = this.metadata
    max_in_flight: 1

logger:
  level: INFO
  format: logfmt
  add_timestamp: true